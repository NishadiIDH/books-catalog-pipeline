version: '3.8'

services:
  app:
    build: .
    container_name: books-catalog-staging
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=staging
      - MONGODB_URI=mongodb://mongo:27017/booksDB
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: books-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
